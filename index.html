<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBA Esma Terkibi Analizi</title>
    <style>
        :root { --olur: #27ae60; --sikinti: #f39c12; --olmaz: #e74c3c; --bg: #121212; }
        body { font-family: 'Courier New', monospace; background: var(--bg); color: #fff; padding: 15px; }
        .mizan-container { max-width: 600px; margin: auto; border: 2px solid #333; padding: 20px; border-radius: 10px; }
        .input-box { margin-bottom: 20px; border-bottom: 1px solid #444; padding-bottom: 15px; }
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; background: #222; color: #00ff00; border: 1px solid #444; }
        button { background: #004400; cursor: pointer; font-weight: bold; }
        .ev-satir { border: 1px solid #333; margin-bottom: 10px; padding: 10px; position: relative; }
        .durum-OLUR { border-right: 10px solid var(--olur); }
        .durum-SIKINTI { border-right: 10px solid var(--sikinti); }
        .durum-OLMAZ { border-right: 10px solid var(--olmaz); }
        .terkip-sayisi { font-size: 1.2em; color: #ffcc00; }
        .hicri-etiket { position: absolute; top: 5px; right: 20px; font-size: 0.8em; color: #888; }
    </style>
</head>
<body>

<div class="mizan-container">
    <h2 style="text-align:center;">SÜLEYMAN KBA MİZANI</h2>
    
    <div class="input-box">
        Doğum Tarihi: <input type="date" id="tarih" value="1971-10-10">
        Kişi Ebced Kodu: <input type="number" id="ebcedKodu" value="0">
        Başlangıç Burcu: 
        <select id="baslangic">
            <option value="6">Terazi (Venüs Başlangıç)</option>
            <option value="0">Koç (Mars Başlangıç)</option>
            <option value="1">Boğa (Venüs Başlangıç)</option>
            <option value="2">İkizler (Merkür Başlangıç)</option>
            <option value="3">Yengeç (Ay Başlangıç)</option>
            <option value="4">Aslan (Güneş Başlangıç)</option>
            <option value="5">Başak (Merkür Başlangıç)</option>
            <option value="7">Akrep (Mars Başlangıç)</option>
            <option value="8">Yay (Jüpiter Başlangıç)</option>
            <option value="9">Oğlak (Satürn Başlangıç)</option>
            <option value="10">Kova (Satürn Başlangıç)</option>
            <option value="11">Balık (Jüpiter Başlangıç)</option>
        </select>
        <button onclick="mizaniDok()">MİZANI VE TERKİBİ HESAPLA</button>
    </div>

    <div id="sonuc"></div>
</div>

<script>
    const gezegenSilsilesi = ["Mars", "Venüs", "Merkür", "Ay", "Güneş", "Merkür", "Venüs", "Mars", "Jüpiter", "Satürn", "Satürn", "Jüpiter"];

    function mizaniDok() {
        const d = document.getElementById('tarih').value;
        const ebced = parseInt(document.getElementById('ebcedKodu').value) || 0;
        const bas = parseInt(document.getElementById('baslangic').value);
        const cikti = document.getElementById('sonuc');
        cikti.innerHTML = "";
        let baslangicTarihi = new Date(d);

        for (let i = 0; i < 12; i++) {
            let evTarihi = new Date(baslangicTarihi);
            evTarihi.setMonth(baslangicTarihi.getMonth() + i);
            if (evTarihi.getDate() !== baslangicTarihi.getDate()) evTarihi.setDate(0);

            const hGun = parseInt(new Intl.DateTimeFormat('tr-u-ca-islamic-umalqura-nu-latn', {day:'numeric'}).format(evTarihi));
            const gezegen = gezegenSilsilesi[(bas + i) % 12];
            let evre = "";

            // Süleyman'ın 1-2-3 / 1-3-2 / 3-2-1 Kuralları
            if (gezegen === "Venüs" || gezegen === "Jüpiter" || gezegen === "Güneş") {
                evre = hGun <= 10 ? "OLUR" : (hGun <= 20 ? "SIKINTI" : "OLMAZ");
            } else if (gezegen === "Ay" || gezegen === "Mars") {
                evre = hGun <= 10 ? "OLUR" : (hGun <= 20 ? "OLMAZ" : "SIKINTI");
            } else if (gezegen === "Merkür") {
                evre = hGun <= 10 ? "OLMAZ" : (hGun <= 20 ? "SIKINTI" : "OLUR");
            } else if (gezegen === "Satürn") {
                evre = hGun <= 15 ? "OLUR" : "OLMAZ";
            }

            // Esma Terkibi Sayısal Değerlendirmesi
            // Kişinin ebcedi ile Ev numarasının mizanı
            const terkipSayisi = ebced + (i + 1); 

            cikti.innerHTML += `
                <div class="ev-satir durum-${evre}">
                    <div class="hicri-etiket">Arabi: ${hGun}</div>
                    <strong>${i+1}. EV [${gezegen}]</strong><br>
                    <span>Evre: ${evre}</span><br>
                    <span class="terkip-sayisi">Terkip Kodu: ${terkipSayisi}</span>
                </div>`;
        }
    }
</script>
</body>
</html>
