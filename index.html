<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>KBA Mizan Paneli</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .kba-container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid #1a2a44; margin-bottom: 25px; padding-bottom: 15px; }
        .header img { max-width: 250px; height: auto; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 0.9em; }
        input, select, button { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #1a2a44; color: white; font-weight: bold; cursor: pointer; border: none; margin-top: 20px; }
        .ev-box { border: 1px solid #eee; padding: 20px; margin-bottom: 15px; border-radius: 10px; background: #fafafa; position: relative; }
        .OLUR { border-left: 10px solid #27ae60; }
        .SIKINTI { border-left: 10px solid #f39c12; }
        .OLMAZ { border-left: 10px solid #e74c3c; }
        .ev-baslik { font-size: 1.1em; font-weight: bold; color: #1a2a44; margin-bottom: 8px; }
        .ev-aciklama { font-size: 0.9em; color: #555; line-height: 1.5; margin-bottom: 10px; font-style: italic; }
        .durum-etiket { font-weight: bold; text-transform: uppercase; }
        .arabi-gun { position: absolute; top: 10px; right: 15px; font-size: 0.8em; color: #888; }
    </style>
</head>
<body>

<div class="kba-container">
    <div class="header">
        <img src="https://i.ibb.co/Lhb8pB3/kba-logo.png" alt="Kendilik Bilinci Akademisi">
        <h2 style="margin-top:10px;">Mizan ve Evre Analizi</h2>
    </div>

    <label>İsim:</label>
    <input type="text" id="isim" placeholder="Danışan ismi">

    <label>Ebced Değeri:</label>
    <input type="number" id="ebced" placeholder="İsim ebcedi">

    <label>Doğum Tarihi:</label>
    <input type="date" id="tarih">

    <label>1. Ev (Yükselen Burç Kapısı):</label>
    <select id="burc">
        <option value="0">Mars (Koç)</option>
        <option value="1">Venüs (Boğa)</option>
        <option value="2">Merkür (İkizler)</option>
        <option value="3">Ay (Yengeç)</option>
        <option value="4">Güneş (Aslan)</option>
        <option value="5">Merkür (Başak)</option>
        <option value="6">Venüs (Terazi)</option>
        <option value="7">Mars (Akrep)</option>
        <option value="8">Jüpiter (Yay)</option>
        <option value="9">Satürn (Oğlak)</option>
        <option value="10">Satürn (Kova)</option>
        <option value="11">Jüpiter (Balık)</option>
    </select>

    <button onclick="hesapla()">MİZANI DÖK</button>

    <div id="sonuclar" style="margin-top:25px;"></div>
</div>

<script>
    const gList = ["Mars", "Venüs", "Merkür", "Ay", "Güneş", "Merkür", "Venüs", "Mars", "Jüpiter", "Satürn", "Satürn", "Jüpiter"];
    
    const evBilgileri = [
        {baslik: "1. Ev: Kimlik Kapısı", metin: "Nefs-i Levvame durağı; kişinin dünyadaki mizaç ve karakter başlangıcıdır."},
        {baslik: "2. Ev: Bereket Kapısı", metin: "Rızık ve emanet mizanı; sahip olunan değerlerin bereket sınavıdır."},
        {baslik: "3. Ev: Kelam Kapısı", metin: "Zihin, dil ve yakın çevreyle kurulan iletişimin hakikat bağıdır."},
        {baslik: "4. Ev: Gönül Kapısı", metin: "Aile, kökler ve içsel huzurun yuvası; asıl yuvaya dönüştür."},
        {baslik: "5. Ev: Aşk Kapısı", metin: "Yaratıcılık, neşe ve ilahi tecellinin hayattaki yansımasıdır."},
        {baslik: "6. Ev: Arınma Kapısı", metin: "Hizmet, çalışma disiplini ve bedensel sağlığın nefis terbiyesidir."},
        {baslik: "7. Ev: Vuslat Kapısı", metin: "Eş ve ortaklık; karşındaki ayna üzerinden kendini okuma sanatıdır."},
        {baslik: "8. Ev: Sır Kapısı", metin: "Eski benliğin yıkılıp, ruhsal dönüşümle yeniden doğuş kapısıdır."},
        {baslik: "9. Ev: Uyanış Kapısı", metin: "İnanç, hikmet ve hakikat yolculuğunun yüksek tekamül durağıdır."},
        {baslik: "10. Ev: Zirve Kapısı", metin: "Toplumsal duruş, kariyer ve başarının liyakat ile mizanıdır."},
        {baslik: "11. Ev: Birlik Kapısı", metin: "Umutlar ve 'Biz' bilinci; kolektif fayda için kurulan hayallerdir."},
        {baslik: "12. Ev: Teslimiyet Kapısı", metin: "Bilinçaltı ve Rabb'e olan mutlak vuslatın sessiz sır alanıdır."}
    ];

    function hesapla() {
        const dStr = document.getElementById('tarih').value;
        const bIdx = parseInt(document.getElementById('burc').value);
        const area = document.getElementById('sonuclar');
        area.innerHTML = "";
        
        if(!dStr) { alert("Lütfen tarih seçin"); return; }
        
        let start = new Date(dStr);

        for (let i = 0; i < 12; i++) {
            let d = new Date(start);
            d.setMonth(start.getMonth() + i);
            if (d.getDate() !== start.getDate()) d.setDate(0);

            const hDay = parseInt(new Intl.DateTimeFormat('tr-u-ca-islamic-umalqura-nu-latn', {day:'numeric'}).format(d));
            const gz = gList[(bIdx + i) % 12];
            let evre = "";

            if (gz === "Venüs" || gz === "Jüpiter" || gz === "Güneş") {
                evre = hDay <= 10 ? "OLUR" : (hDay <= 20 ? "SIKINTI" : "OLMAZ");
            } else if (gz === "Ay" || gz === "Mars") {
                evre = hDay <= 10 ? "OLUR" : (hDay <= 20 ? "OLMAZ" : "SIKINTI");
            } else if (gz === "Merkür") {
                evre = hDay <= 10 ? "OLMAZ" : (hDay <= 20 ? "SIKINTI" : "OLUR");
            } else if (gz === "Satürn") {
                evre = hDay <= 15 ? "OLUR" : "OLMAZ";
            }

            area.innerHTML += `
                <div class="ev-box ${evre}">
                    <div class="arabi-gun">Arabi Gün: ${hDay}</div>
                    <div class="ev-baslik">${evBilgileri[i].baslik}</div>
                    <div class="ev-aciklama">${evBilgileri[i].metin}</div>
                    <strong>Kapı:</strong> ${gz} | <span class="durum-etiket">DURUM: ${evre}</span>
                </div>`;
        }
    }
</script>
</body>
</html>
