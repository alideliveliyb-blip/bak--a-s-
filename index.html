     <!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBA Mizan Rehberi</title>
    <style>
        :root { --olur: #27ae60; --sikinti: #f39c12; --olmaz: #e74c3c; --bg: #f4f7f6; --kba-dark: #1a2a44; --kba-gold: #c5a059; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: #333; padding: 15px; margin: 0; line-height: 1.6; }
        .container { max-width: 550px; margin: auto; background: #ffffff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid var(--kba-dark); }
        .header { text-align: center; margin-bottom: 30px; }
        .kba-logo { width: 100%; max-width: 240px; height: auto; margin-bottom: 15px; }
        .header h1 { font-size: 1.3em; color: var(--kba-dark); margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        .input-group { background: #fdfdfd; padding: 20px; border-radius: 15px; margin-bottom: 30px; border: 1px solid #eee; }
        label { display: block; font-size: 0.75em; font-weight: bold; color: var(--kba-dark); margin-top: 12px; text-transform: uppercase; }
        input, select, button { width: 100%; padding: 14px; margin: 6px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 15px; box-sizing: border-box; }
        button { background: var(--kba-dark); color: white; font-weight: bold; border: none; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .ev-card { background: #fff; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #f0f0f0; border-left: 10px solid #ccc; position: relative; }
        .card-OLUR { border-left-color: var(--olur); background: #fafffa; }
        .card-SIKINTI { border-left-color: var(--sikinti); background: #fffdf5; }
        .card-OLMAZ { border-left-color: var(--olmaz); background: #fffafa; }
        .ev-baslik { font-weight: bold; color: var(--kba-dark); font-size: 1.1em; margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .hikmet-ozeti { font-size: 0.85em; color: #555; margin: 10px 0; font-style: italic; background: rgba(255,255,255,0.6); padding: 8px; border-radius: 5px; }
        .durum-sonuc { font-weight: 800; text-transform: uppercase; margin-top: 10px; font-size: 1em; }
        /* Yeni Uyarı Kutusu Stili */
        .rehber-mesaj { margin-top: 12px; padding: 10px; border-radius: 6px; font-size: 0.85em; font-weight: 500; border: 1px solid transparent; }
        .uyari-OLUR { background: #e8f5e9; color: #1b5e20; border-color: #c8e6c9; }
        .uyari-SIKINTI { background: #fff3e0; color: #e65100; border-color: #ffe0b2; }
        .uyari-OLMAZ { background: #ffebee; color: #b71c1c; border-color: #ffcdd2; }
        .text-OLUR { color: var(--olur); }
        .text-SIKINTI { color: var(--sikinti); }
        .text-OLMAZ { color: var(--olmaz); }
        .arabi-tag { position: absolute; top: 15px; right: 15px; background: var(--kba-dark); padding: 3px 10px; border-radius: 20px; font-size: 0.7em; font-weight: bold; color: #fff; }
        .footer { text-align: center; font-size: 0.75em; color: #999; margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://i.ibb.co/Lhb8pB3/kba-logo.png" onerror="this.src='https://via.placeholder.com/250x80?text=KEND%C4%B0L%C4%B0K+B%C4%B0L%C4%B0NC%C4%B0'" alt="KBA Logo" class="kba-logo">
        <h1>KBA Mizan Rehberi</h1>
    </div>
    
    <div class="input-group">
        <label>Danışan Adı</label>
        <input type="text" id="isim" placeholder="Ad Soyad">
        <label>Doğum Tarihi</label>
        <input type="date" id="tarih" value="1965-03-29">
        <label>Yükselen / 1. Ev Burcu</label>
        <select id="burc">
            <option value="0">Koç (Mars Başlangıç)</option>
            <option value="1">Boğa (Venüs Başlangıç)</option>
            <option value="2">İkizler (Merkür Başlangıç)</option>
            <option value="3">Yengeç (Ay Başlangıç)</option>
            <option value="4">Aslan (Güneş Başlangıç)</option>
            <option value="5">Başak (Merkür Başlangıç)</option>
            <option value="6">Terazi (Venüs Başlangıç)</option>
            <option value="7">Akrep (Mars Başlangıç)</option>
            <option value="8">Yay (Jüpiter Başlangıç)</option>
            <option value="9">Oğlak (Satürn Başlangıç)</option>
            <option value="10">Kova (Satürn Başlangıç)</option>
            <option value="11">Balık (Jüpiter Başlangıç)</option>
        </select>
        <button onclick="analiziBaslat()">MİZANI VE REHBERİ GÖRÜNTÜLE</button>
    </div>

    <div id="sonucPaneli"></div>
    <div class="footer">© Kendilik Bilinci Akademisi | KBA</div>
</div>

<script>
    const gezegenler = ["Mars", "Venüs", "Merkür", "Ay", "Güneş", "Merkür", "Venüs", "Mars", "Jüpiter", "Satürn", "Satürn", "Jüpiter"];
    const hikmetler = [
        "<b>Kimlik Kapısı:</b> Ruhun dünyaya açılan ilk kapısı, nefs terbiyesinin başladığı yerdir.",
        "<b>Bereket Kapısı:</b> Rızkın ve emanetin mizanıdır; sahip olduklarınla kurduğun bağdır.",
        "<b>Kelam Kapısı:</b> Zihnin, dilin ve yakın çevrenin hakikat ile olan imtihanıdır.",
        "<b>Gönül Kapısı:</b> Aile, kökler ve içsel huzurun merkezidir; asıl yuvaya dönüştür.",
        "<b>Aşk Kapısı:</b> Yaratıcılık, neşe ve ilahi tecellinin hayat bulduğu alandır.",
        "<b>Arınma Kapısı:</b> Hizmet, disiplin ve bedensel sağlığın nefis ile terbiyesidir.",
        "<b>Vuslat Kapısı:</b> Eş ve ortaklık; karşındakinin üzerinden kendini okuma sanatıdır.",
        "<b>Sır Kapısı:</b> Krizler ve büyük dönüşümler; eski benliğin yıkılıp yeniden doğuşudur.",
        "<b>Uyanış Kapısı:</b> Hikmet, inanç ve hakikat yolculuğunun yüksek basamağıdır.",
        "<b>Zirve Kapısı:</b> Toplumsal duruş, kariyer ve başarının ahlak ile mizanıdır.",
        "<b>Birlik Kapısı:</b> Umutlar ve sosyal çevre; 'Ben'den 'Biz'e geçişin duasıdır.",
        "<b>Teslimiyet Kapısı:</b> Bilinçaltı ve gizli düşmanlar; mutlak teslimiyetin vuslatıdır."
    ];

    function analiziBaslat() {
        const ad = document.getElementById('isim').value || "Katılımcı";
        const dStr = document.getElementById('tarih').value;
        const bIdx = parseInt(document.getElementById('burc').value);
        const area = document.getElementById('sonucPaneli');
        area.innerHTML = `<p style='text-align:center;'>Sayın <b>${ad}</b>, mizan evreleriniz:</p>`;
        
        let start = new Date(dStr);

        for (let i = 0; i < 12; i++) {
            let d = new Date(start);
            d.setMonth(start.getMonth() + i);
            if (d.getDate() !== start.getDate()) d.setDate(0);

            const hDay = parseInt(new Intl.DateTimeFormat('tr-u-ca-islamic-umalqura-nu-latn', {day:'numeric'}).format(d));
            const gz = gezegenler[(bIdx + i) % 12];
            let evre = "";
            let mesaj = "";

            if (gz === "Venüs" || gz === "Jüpiter" || gz === "Güneş") {
                evre = hDay <= 10 ? "OLUR" : (hDay <= 20 ? "SIKINTI" : "OLMAZ");
            } else if (gz === "Ay" || gz === "Mars") {
                evre = hDay <= 10 ? "OLUR" : (hDay <= 20 ? "OLMAZ" : "SIKINTI");
            } else if (gz === "Merkür") {
                evre = hDay <= 10 ? "OLMAZ" : (hDay <= 20 ? "SIKINTI" : "OLUR");
            } else if (gz === "Satürn") {
                evre = hDay <= 15 ? "OLUR" : "OLMAZ";
            }

            // Rehber Mesajları (Senin isteğin üzerine)
            if(evre === "OLUR") mesaj = "✨ <b>Yol Açık:</b> Akışta kal, gayret et ve bu alanın şükrünü eda et.";
            if(evre === "SIKINTI") mesaj = "⚠️ <b>Dikkat:</b> Tedbir al, fevri kararlardan kaçın ve esma zikriyle alanı koru.";
            if(evre === "OLMAZ") mesaj = "🛑 <b>Teslimiyet:</b> Zorlama, rıza göster. Bu alanda arınma ve bekleyiş sınavındasın.";

            area.innerHTML += `
                <div class="ev-card card-${evre}">
                    <div class="arabi-tag">GÜN: ${hDay}</div>
                    <div class="ev-baslik">${i+1}. EV: ${gz} Kapısı</div>
                    <div class="hikmet-ozeti">${hikmetler[i]}</div>
                    <div class="durum-sonuc text-${evre}">DURUM: ${evre}</div>
                    <div class="rehber-mesaj uyari-${evre}">${mesaj}</div>
                </div>`;
        }
    }
</script>
</body>
</html>
