<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBA Mizan Rehberi</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a2a44; color: #fff; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: #2c3e50; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { text-align: center; margin-bottom: 20px; }
        .header img { max-width: 150px; margin-bottom: 10px; border-radius: 10px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; font-size: 16px; }
        button { background: #e74c3c; color: white; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        button:hover { background: #c0392b; }
        .ev-card { background: #34495e; margin: 10px 0; padding: 15px; border-left: 8px solid #95a5a6; border-radius: 5px; }
        .OLUR { border-left-color: #27ae60; }
        .SIKINTI { border-left-color: #f1c40f; }
        .OLMAZ { border-left-color: #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://i.ibb.co/Lhb8pB3/kba-logo.png" alt="KBA LOGO">
        <h2>SÜLEYMAN MİZANI</h2>
    </div>

    <label>Doğum Tarihi:</label>
    <input type="date" id="tarih" value="1965-03-29">

    <label>İsim Ebced Değeri:</label>
    <input type="number" id="ebced" placeholder="Örn: 191">

    <label>Burç/Ev Başlangıcı:</label>
    <select id="burc">
        <option value="0">Koç (Mars Başlangıç)</option>
        <option value="1">Boğa (Venüs Başlangıç)</option>
        <option value="2">İkizler (Merkür Başlangıç)</option>
        <option value="3">Yengeç (Ay Başlangıç)</option>
        <option value="4">Aslan (Güneş Başlangıç)</option>
        <option value="5">Başak (Merkür Başlangıç)</option>
        <option value="6">Terazi (Venüs Başlangıç)</option>
        <option value="7">Akrep (Mars Başlangıç)</option>
        <option value="8">Yay (Jüpiter Başlangıç)</option>
        <option value="9">Oğlak (Satürn Başlangıç)</option>
        <option value="10">Kova (Satürn Başlangıç)</option>
        <option value="11">Balık (Jüpiter Başlangıç)</option>
    </select>

    <button onclick="analizEt()">HESAPLA VE BİRLEŞTİR</button>

    <div id="sonuclar"></div>
</div>

<script>
    const gezegenler = ["Mars", "Venüs", "Merkür", "Ay", "Güneş", "Merkür", "Venüs", "Mars", "Jüpiter", "Satürn", "Satürn", "Jüpiter"];
    const konular = ["Kimlik", "Rızık", "İletişim", "Aile", "Neşe", "Hizmet", "Ayna", "Dönüşüm", "Uyanış", "Zirve", "Birlik", "Teslimiyet"];

    function analizEt() {
        const tarihVal = document.getElementById('tarih').value;
        const ebcedVal = parseInt(document.getElementById('ebced').value);
        const burcIdx = parseInt(document.getElementById('burc').value);
        const panel = document.getElementById('sonuclar');

        if (!tarihVal || isNaN(ebcedVal) || ebcedVal <= 0) {
            alert("Lütfen geçerli bir Tarih ve Ebced Değeri (0'dan büyük) giriniz.");
            return;
        }

        panel.innerHTML = "";
        let baslangic = new Date(tarihVal);

        for (let i = 0; i < 12; i++) {
            let d = new Date(baslangic);
            d.setMonth(baslangic.getMonth() + i);
            const hDay = parseInt(new Intl.DateTimeFormat('tr-u-ca-islamic-umalqura-nu-latn', {day:'numeric'}).format(d));
            const gz = gezegenler[(burcIdx + i) % 12];
            
            let evre = "OLUR";
            if (["Venüs", "Jüpiter", "Güneş"].includes(gz)) {
                evre = hDay <= 10 ? "OLUR" : (hDay <= 20 ? "SIKINTI" : "OLMAZ");
            } else if (["Ay", "Mars"].includes(gz)) {
                evre = hDay <= 10 ? "OLUR" : (hDay <= 20 ? "OLMAZ" : "SIKINTI");
            } else if (gz === "Merkür") {
                evre = hDay <= 10 ? "OLMAZ" : (hDay <= 20 ? "SIKINTI" : "OLUR");
            } else if (gz === "Satürn") {
                evre = hDay <= 15 ? "OLUR" : "OLMAZ";
            }

            panel.innerHTML += `
                <div class="ev-card ${evre}">
                    <strong>${i+1}. EV (${gz})</strong> - A:${hDay}<br>
                    Terkip Sayısal Kodu: ${ebcedVal + i + 1}<br>
                    Durum: ${evre}
                </div>`;
        }
    }
</script>
</body>
</html>
