<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>KBA Mizan Rehberi</title>
    <style>
        :root { --olur: #27ae60; --sikinti: #f39c12; --olmaz: #e74c3c; --kba-dark: #1a2a44; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .kba-container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 8px solid var(--kba-dark); }
        .header { text-align: center; margin-bottom: 25px; }
        .header img { max-width: 250px; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 0.9em; color: var(--kba-dark); }
        input, select, button { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: var(--kba-dark); color: white; font-weight: bold; cursor: pointer; border: none; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #2c3e50; }
        .ev-box { border: 1px solid #eee; padding: 20px; margin-bottom: 20px; border-radius: 10px; background: #fafafa; position: relative; }
        .OLUR { border-left: 10px solid var(--olur); }
        .SIKINTI { border-left: 10px solid var(--sikinti); }
        .OLMAZ { border-left: 10px solid var(--olmaz); }
        .ev-baslik { font-size: 1.1em; font-weight: bold; color: var(--kba-dark); margin-bottom: 8px; }
        .ev-aciklama { font-size: 0.9em; color: #555; line-height: 1.6; margin-bottom: 12px; background: #fff; padding: 10px; border-radius: 5px; border: 1px dashed #ddd; }
        .uyari-mesaj { font-size: 0.85em; font-weight: 600; padding: 8px; border-radius: 5px; margin-top: 10px; }
        .msg-OLUR { background: #e8f5e9; color: #1b5e20; }
        .msg-SIKINTI { background: #fff3e0; color: #e65100; }
        .msg-OLMAZ { background: #ffebee; color: #b71c1c; }
        .arabi-gun { position: absolute; top: 10px; right: 15px; font-size: 0.75em; font-weight: bold; color: #999; }
    </style>
</head>
<body>

<div class="kba-container">
    <div class="header">
        <img src="https://i.ibb.co/Lhb8pB3/kba-logo.png" alt="Kendilik Bilinci Akademisi">
        <h2>Mizan ve Tekamül Rehberi</h2>
    </div>

    <label>İsim:</label>
    <input type="text" id="isim" placeholder="Danışan İsmi">

    <label>Ebced Değeri:</label>
    <input type="number" id="ebced" placeholder="İsim Ebcedi">

    <label>Doğum Tarihi:</label>
    <input type="date" id="tarih">

    <label>1. Ev (Yükselen Burç):</label>
    <select id="burc">
        <option value="0">Koç (Mars)</option>
        <option value="1">Boğa (Venüs)</option>
        <option value="2">İkizler (Merkür)</option>
        <option value="3">Yengeç (Ay)</option>
        <option value="4">Aslan (Güneş)</option>
        <option value="5">Başak (Merkür)</option>
        <option value="6">Terazi (Venüs)</option>
        <option value="7">Akrep (Mars)</option>
        <option value="8">Yay (Jüpiter)</option>
        <option value="9">Oğlak (Satürn)</option>
        <option value="10">Kova (Satürn)</option>
        <option value="11">Balık (Jüpiter)</option>
    </select>

    <button onclick="mizaniDok()">ANALİZİ BAŞLAT</button>

    <div id="sonuclar" style="margin-top:25px;"></div>
</div>

        {baslik: "7. Ev: Ayna ve Vuslat Kapısı", metin: "Eş ve ortaklık sınavıdır. Karşındaki kişi üzerinden kendini okuma ve denge kurma sanatıdır."},
        {baslik: "8. Ev: Sır ve Dönüşüm Kapısı", metin: "Ölmeden önce ölmek sırrıdır. Krizler üzerinden eski benliğin yıkılıp yeniden doğduğu yerdir."},
        {baslik: "9. Ev: Hakikat ve Hikmet Kapısı", metin: "Yüksek ilim, inanç ve uzak ufukların mizanıdır. Taklitten tahkike geçişin kapısıdır."},

    ];
